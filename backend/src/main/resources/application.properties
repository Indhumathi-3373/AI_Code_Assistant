# Spring Application Configuration
server.port=8080

# Swagger OpenAPI UI Configuration paths
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# OpenAI Configuration
# Binds to system environment variable OPENAI_API_KEY.
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model=gpt-4o-mini

# PostgreSQL Configuration (Default for development/production)
spring.datasource.url=jdbc:postgresql://localhost:5432/codementordb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (needs to be 256-bit / 64 characters hex)
jwt.secret=9a4f2c8d3e7b1a5f8c6e2d9a4f2c8d3e7b1a5f8c6e2d9a4f2c8d3e7b1a5f8c6e
jwt.expirationMs=86400000

